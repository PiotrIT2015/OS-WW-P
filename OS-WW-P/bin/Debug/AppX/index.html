<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Mały OS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="desktop">
        <div id="taskbar">
            <div id="start-menu">Menu Start</div>
            <div id="clock"></div>
        </div>
        <div id="window" class="hidden">
            <div id="window-header">
                <span id="window-title">Notatnik</span>
                <button id="close-window">X</button>
            </div>
            <textarea id="notepad"></textarea>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
